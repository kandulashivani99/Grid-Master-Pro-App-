<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>GridMaster Test</title>
<style>
body{font-family:system-ui;background:#0b1416;color:#e6f4ef;padding:20px;max-width:600px;margin:auto}
h1{color:#22d3ee}
.test{background:#122024;padding:14px;margin:10px 0;border-radius:10px;border-left:4px solid #16a34a}
.fail{border-left-color:#dc2626}
.pass{color:#16a34a;font-weight:bold}
.fail-txt{color:#dc2626;font-weight:bold}
button{background:linear-gradient(135deg,#06b6d4,#16a34a);color:white;border:none;padding:12px 24px;border-radius:10px;font-size:1rem;cursor:pointer;margin:10px 0}
code{background:#1e293b;padding:2px 6px;border-radius:4px}
.result{margin-top:8px;font-family:monospace;font-size:.85rem;color:#94aab2}
</style></head>
<body>
<h1>🧪 GridMaster Diagnostic v2</h1>
<p>This page tests app logic (without DOM dependencies).</p>
<button onclick="runTests()">▶ Run All Tests</button>
<div id="results"></div>

<!-- Load order: i18n FIRST, then app -->
<script src="i18n.js"></script>
<script>
  // Stub out DOM-dependent calls so app.js's onload doesn't crash on missing #splash
  window.addEventListener('error', function(e){
    document.getElementById('results').innerHTML += '<div class="test fail"><b class="fail-txt">JS Error caught:</b><div class="result">'+e.message+' @ '+e.filename+':'+e.lineno+'</div></div>';
  });
</script>
<script src="app.js"></script>

<script>
function runTests(){
  const r = document.getElementById('results');
  r.innerHTML='';
  const tests = [
    ['JS function calcSolar loaded',()=> typeof calcSolar==='function'],
    ['JS function calcWind loaded',()=> typeof calcWind==='function'],
    ['JS function calcEB loaded',()=> typeof calcEB==='function'],
    ['JS function generateReport loaded',()=> typeof generateReport==='function'],
    ['i18n loaded (t function)',()=> typeof t==='function'],
    ['i18n English works',()=> t('welcome').includes('Welcome')],
    ['i18n Hindi works',()=> { setLang('hi'); const ok=I18N.hi.welcome==='स्वागत है ⚡'; setLang('en'); return ok; }],
    ['Solar formula: 1.6 m² × 1000 W/m² × 18% = 288W',()=> Math.round(1.6*1000*0.18)===288],
    ['Wind formula correct',()=> Math.abs(0.5*1.225*Math.PI*4*1000*0.4*0.9 - 2770.6)<10],
    ['Boost duty Vin=24 Vout=48 → 50%',()=> Math.round((1-24/48)*100)===50],
    ['HP↔kW: 5HP ≈ 3.7285 kW',()=> Math.abs(5*0.7457 - 3.7285)<0.001],
    ['EB Telangana 250 units = ₹1060',()=>{
      // slabs: 100@2.6, 200@4.4, 300@7.2 → 100*2.6 + 100*4.4 + 50*7.2 = 260+440+360 = 1060
      const slabs=[[100,2.6],[200,4.4],[300,7.2],[400,8.5],[800,9],[Infinity,9.5]];
      let rem=250,last=0,total=0;
      for(const[lim,rate]of slabs){if(rem<=0)break;const u=Math.min(rem,lim-last);if(u>0){total+=u*rate;rem-=u;last=lim;}}
      return Math.round(total)===1060;
    }],
    ['Cable size logic (25A, 25m, 3%, 230V) → 4mm²',()=>{
      const Smin=(2*25*0.0175*25)/(0.03*230);
      const sizes=[1.5,2.5,4,6,10,16,25,35,50,70,95,120];
      return (sizes.find(s=>s>=Smin)||150)===4;
    }],
  ];
  let passed=0;
  tests.forEach(([name,fn])=>{
    let ok=false,err='';
    try{ok=fn();}catch(e){err=e.message;}
    if(ok)passed++;
    r.innerHTML+='<div class="test '+(ok?'':'fail')+'">'+
      '<div class="'+(ok?'pass':'fail-txt')+'">'+(ok?'✅ PASS':'❌ FAIL')+'</div>'+
      '<div>'+name+'</div>'+
      (err?'<div class="result">Error: '+err+'</div>':'')+
      '</div>';
  });
  r.innerHTML='<div class="test" style="border-left-color:'+(passed===tests.length?'#16a34a':'#f59e0b')+'"><h2 style="margin:0">'+passed+' / '+tests.length+' passed</h2></div>'+r.innerHTML;
  r.innerHTML+='<div class="test"><b>jsPDF:</b> '+(window.jspdf?'<span class="pass">✅ Loaded</span>':'<span style="color:#f59e0b">⚠ Not loaded (offline mode)</span>')+'</div>';
  r.innerHTML+='<p style="margin-top:20px"><a href="index.html" style="color:#22d3ee;font-size:1.1rem">→ Open the actual app</a></p>';
}
</script>
</body></html>
